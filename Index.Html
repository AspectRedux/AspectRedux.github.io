<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AspectRedux</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 30px;
        width: 320px;
        text-align: center;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
    }

    .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(45deg, #5865F2, #00ffcc);
        margin: auto;
        margin-bottom: 15px;
    }

    h1 {
        margin: 10px 0 5px;
        font-size: 24px;
    }

    p {
        color: #aaa;
        font-size: 14px;
    }

    .btn {
        margin-top: 15px;
        display: inline-block;
        padding: 10px 15px;
        border-radius: 10px;
        background: #5865F2;
        color: white;
        text-decoration: none;
        font-size: 14px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #4752c4;
    }
</style>
</head>

<body>

<div class="card">
    <div class="avatar"></div>
    <h1>AspectRedux</h1>
    <p>Just a cool Discord-style profile page</p>

    <a class="btn" href="https://github.com/AspectRedux" target="_blank">
        My GitHub
    </a>
</div>

</body>
